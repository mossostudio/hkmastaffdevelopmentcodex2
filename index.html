<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>教師發展活動速覽 | 香港管理專業協會羅桂祥中學</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700&display=swap');
body{font-family:'Noto Sans HK',sans-serif;background:#f8f9fa}.modal{animation:fade .18s ease-out}@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body class="text-slate-800">
<header class="relative overflow-hidden bg-[#1c2c44] text-white">
<div class="absolute inset-0 opacity-25 bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1541829070764-84a7d30dd3f3?auto=format&fit=crop&w=2000&q=80')"></div>
<div class="relative max-w-7xl mx-auto px-5 py-8">
<div class="flex flex-col gap-5 md:flex-row md:items-center md:justify-between">
<div><div class="text-[#FFC72C] text-sm font-bold tracking-wide">香港管理專業協會羅桂祥中學</div><h1 class="text-3xl font-bold mt-1">教師發展活動速覽</h1><p class="text-slate-300 text-sm mt-2">快速找到 EDB 教師專業發展活動並報名</p></div>
<div class="flex flex-wrap gap-3 text-sm"><a class="border border-[#FFC72C] text-[#FFC72C] rounded-md px-4 py-2 hover:bg-white/10" href="https://www.edb.gov.hk/tc/teacher/qualification-training-development/development/cpd-teachers/index.html" target="_blank">教師專業階梯</a><a class="border border-white/50 rounded-md px-4 py-2 hover:bg-white/10" href="https://tcs.edb.gov.hk/tcs/portal/publiccalendar/searchPublicCal/load.htm?pdType=0&leveltype=4&homePageSelection=3&fromMenu=Y" target="_blank">EDB 完整列表</a></div>
</div>
<div class="mt-7 flex flex-wrap justify-between gap-3 text-xs text-slate-300"><span id="stat">載入中...</span><span id="updated">等待同步</span></div>
</div>
</header>
<section class="sticky top-0 z-20 bg-white border-b shadow-sm"><div class="max-w-7xl mx-auto px-5 py-4 space-y-3"><input id="search" class="w-full rounded-lg border border-slate-200 px-4 py-3 text-sm outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-100" placeholder="搜尋活動名稱、科目、課程編號..."><div class="flex items-center justify-between gap-4 overflow-x-auto"><div id="filters" class="flex gap-2"><button data-tag="all" class="tag rounded-full bg-[#1c2c44] px-4 py-1.5 text-sm text-white">全部</button></div><div id="count" class="shrink-0 text-sm text-slate-500">載入中...</div></div></div></section>
<main class="max-w-7xl mx-auto px-5 py-8"><div id="status" class="py-20 text-center text-slate-500">正在直接從 Google Sheet 載入即時活動數據...</div><div id="grid" class="hidden grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div></main>
<div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/50 p-4 modal"><div class="max-h-[90vh] w-full max-w-3xl overflow-hidden rounded-2xl bg-white shadow-2xl"><div class="flex items-center justify-between border-b px-5 py-4"><h2 class="font-bold">活動詳情</h2><button id="close" class="rounded-full bg-slate-100 px-3 py-1.5 text-slate-600">關閉</button></div><div id="detail" class="max-h-[75vh] overflow-y-auto p-6"></div></div></div>
<script>
const SHEET='1cx1UgoMy8ynIVv9XeAvymrleVpX9VnnNX0IjjkUFfyc';
const URL=`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
const $=id=>document.getElementById(id);let all=[],tag='all',q='';
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function csv(t){let a=[['']],r=0,c=0,qq=false;for(let i=0;i<t.length;i++){let x=t[i],n=t[i+1];if(x==='"'&&qq&&n==='"'){a[r][c]+=x;i++;continue}if(x==='"'){qq=!qq;continue}if(x===','&&!qq){a[r][++c]='';continue}if((x==='\n'||x==='\r')&&!qq){if(x==='\r'&&n==='\n')i++;a[++r]=[''];c=0;continue}a[r][c]+=x}let h=a.shift().map(x=>x.trim());return a.filter(x=>x.some(Boolean)).map(row=>Object.fromEntries(h.map((k,i)=>[k,row[i]||''])))}
function fmt(d){if(!d)return '—';if(/^\d+$/.test(d)){let x=new Date(+d);return `${x.getFullYear()}年${x.getMonth()+1}月${x.getDate()}日`}let x=new Date(d.replace(/-/g,'/'));return isNaN(x)?d:`${x.getFullYear()}年${x.getMonth()+1}月${x.getDate()}日`}
function normalize(rows){return rows.map(r=>({id:r.courseId||'',title:r.title||'未命名活動',date:r.eventDateDisplay||r.eventDateStart||'—',start:r.eventDateStart||'',time:r.eventTime||'—',deadline:fmt(r.deadline),cpd:r.cpdCategory||'一般',subject:r.subject||'',summary:r.summary||'無簡介',tags:(r.categoryTags||'').split(',').map(x=>x.trim()).filter(Boolean),url:r.detailUrl||'#',isNew:String(r.isNew||'').toUpperCase()==='TRUE'})).sort((a,b)=>new Date((a.start||'2999/1/1').replace(/-/g,'/'))-new Date((b.start||'2999/1/1').replace(/-/g,'/')))}
function filtered(){let s=q.trim().toLowerCase();return all.filter(a=>(tag==='all'||a.tags.includes(tag))&&(!s||[a.title,a.id,a.subject,a.summary].some(v=>String(v).toLowerCase().includes(s))))}
function card(a){return `<article class="flex h-full flex-col rounded-xl border bg-white p-5 shadow-sm transition hover:shadow-md"><div class="mb-3 flex gap-2"><span class="rounded bg-slate-100 px-2.5 py-1 text-xs text-slate-600">${esc(a.cpd)}</span>${a.isNew?'<span class="rounded border border-red-200 bg-red-50 px-2.5 py-1 text-xs text-red-600">新增</span>':''}</div><h3 class="text-lg font-bold leading-snug text-slate-950">${esc(a.title)}</h3><p class="mt-1 font-mono text-xs text-slate-400">${esc(a.id)}</p><dl class="mt-4 space-y-2 text-sm text-slate-600"><div><dt class="inline text-slate-400">活動日期：</dt><dd class="inline font-medium text-slate-900">${esc(a.date)}</dd></div><div><dt class="inline text-slate-400">活動時間：</dt><dd class="inline">${esc(a.time)}</dd></div><div><dt class="inline text-orange-500">報名截止：</dt><dd class="inline text-slate-900">${esc(a.deadline)}</dd></div></dl><p class="mt-4 line-clamp-4 rounded-r-lg border-l-4 border-blue-400 bg-slate-50 p-4 text-sm leading-relaxed text-slate-700">${esc(a.summary)}</p><div class="mt-auto pt-4 text-right"><button class="detail rounded-lg bg-[#1c2c44] px-4 py-2 text-sm font-medium text-white" data-id="${esc(a.id)}">活動詳情</button></div></article>`}
function render(){let data=filtered();$('count').textContent=`${data.length} 個結果`;$('grid').innerHTML=data.length?data.map(card).join(''):`<div class="col-span-full rounded-xl border border-dashed bg-white p-12 text-center text-slate-500">找不到符合條件的活動</div>`;$('grid').classList.remove('hidden');$('grid').classList.add('grid');$('status').classList.add('hidden')}
function filters(){let tags=[...new Set(all.flatMap(a=>a.tags))].sort();$('filters').innerHTML='<button data-tag="all" class="tag rounded-full bg-[#1c2c44] px-4 py-1.5 text-sm text-white">全部</button>'+tags.map(t=>`<button data-tag="${esc(t)}" class="tag rounded-full bg-slate-100 px-4 py-1.5 text-sm text-slate-700">${esc(t)}</button>`).join('')}
function show(id){let a=all.find(x=>x.id===id);if(!a)return;$('detail').innerHTML=`<span class="inline-block rounded bg-blue-50 px-3 py-1 text-sm text-blue-700">${esc(a.cpd)}</span><h2 class="mt-3 text-2xl font-bold leading-snug">${esc(a.title)}</h2><p class="mt-2 font-mono text-sm text-slate-500">編號：${esc(a.id)}</p><div class="mt-6 grid gap-4 md:grid-cols-2"><div class="rounded-xl border bg-slate-50 p-4"><p class="text-xs text-slate-500">活動日期</p><p class="font-medium">${esc(a.date)}</p><p class="text-sm text-slate-600">${esc(a.time)}</p></div><div class="rounded-xl border border-orange-100 bg-orange-50 p-4"><p class="text-xs text-orange-500">報名截止日期</p><p class="font-bold text-orange-600">${esc(a.deadline)}</p></div></div><h3 class="mt-6 font-bold">活動簡介</h3><p class="mt-3 whitespace-pre-wrap rounded-xl bg-slate-50 p-5 leading-relaxed">${esc(a.summary)}</p><div class="mt-6 text-right"><a class="inline-block rounded-xl bg-blue-600 px-6 py-3 text-sm font-bold text-white" target="_blank" href="${a.url.startsWith('http')?esc(a.url):'#'}">前往 EDB 報名</a></div>`;$('modal').classList.remove('hidden');$('modal').classList.add('flex')}
$('search').addEventListener('input',e=>{q=e.target.value;render()});$('filters').addEventListener('click',e=>{let b=e.target.closest('.tag');if(!b)return;tag=b.dataset.tag;document.querySelectorAll('.tag').forEach(x=>x.className='tag rounded-full bg-slate-100 px-4 py-1.5 text-sm text-slate-700');b.className='tag rounded-full bg-[#1c2c44] px-4 py-1.5 text-sm text-white';render()});$('grid').addEventListener('click',e=>{let b=e.target.closest('.detail');if(b)show(b.dataset.id)});$('close').onclick=()=>{$('modal').classList.add('hidden');$('modal').classList.remove('flex')};$('modal').addEventListener('click',e=>{if(e.target.id==='modal')$('close').click()});
fetch(URL).then(r=>{if(!r.ok)throw Error('load');return r.text()}).then(t=>{all=normalize(csv(t));filters();$('stat').textContent=`${all.length} 個活動`;$('updated').textContent='最新同步於 '+new Date().toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'});render()}).catch(()=>{$('status').innerHTML='<span class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 font-bold text-red-600">載入 Google Sheet 失敗，請確認試算表已公開。</span>'});
</script>
</body>
</html>
