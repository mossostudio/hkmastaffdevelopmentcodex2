<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>教師發展活動速覽 | 香港管理專業協會羅桂祥中學</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700&display=swap');
body{font-family:'Noto Sans HK',sans-serif;background:#f8f9fa}.scrollbar::-webkit-scrollbar{height:4px;width:6px}.scrollbar::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:999px}.modal{animation:fade .18s ease-out}@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body class="text-slate-800 antialiased">
<header class="relative overflow-hidden bg-[#1c2c44] text-white">
<div class="absolute inset-0 opacity-30 mix-blend-overlay bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1541829070764-84a7d30dd3f3?auto=format&fit=crop&w=2000&q=80')"></div>
<div class="absolute inset-0 bg-gradient-to-r from-[#1c2c44] via-[#1c2c44]/90 to-[#1c2c44]/55"></div>
<div class="relative mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
<div class="flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
<div><div class="mb-1 text-sm font-bold tracking-wider text-[#FFC72C]">香港管理專業協會羅桂祥中學</div><h1 class="text-2xl font-bold leading-tight tracking-tight sm:text-3xl">教師發展活動速覽</h1><p class="mt-1.5 text-sm font-medium text-slate-300">快速找到 EDB 教師專業發展活動並報名</p></div>
<div class="flex flex-wrap gap-3 text-sm"><a class="rounded-md border border-[#FFC72C] px-5 py-2 font-medium text-[#FFC72C] transition hover:bg-[#FFC72C]/10" target="_blank" href="https://www.edb.gov.hk/tc/teacher/qualification-training-development/development/cpd-teachers/index.html">教師專業階梯</a><a class="rounded-md border border-white/50 px-5 py-2 font-medium text-white transition hover:bg-white/10" target="_blank" href="https://tcs.edb.gov.hk/tcs/portal/publiccalendar/searchPublicCal/load.htm?pdType=0&leveltype=4&homePageSelection=3&fromMenu=Y">EDB 完整列表</a></div>
</div>
<div class="mt-7 flex flex-wrap items-center justify-between gap-3 border-t border-white/10 pt-3 text-xs text-slate-300"><span id="statTotal" class="rounded-full bg-white/5 px-3 py-1">載入中...</span><span id="statUpdated">等待同步</span></div>
</div>
</header>
<section class="sticky top-0 z-30 border-b border-slate-200 bg-white shadow-sm">
<div class="mx-auto max-w-[1400px] px-4 py-4 sm:px-6 lg:px-8">
<div class="mb-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
<input id="searchInput" class="w-full max-w-4xl rounded-lg border border-slate-200 px-4 py-3 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:ring-4 focus:ring-blue-100" placeholder="搜尋活動名稱、科目、課程編號...">
<div class="flex shrink-0 rounded-lg border border-slate-200 bg-slate-100 p-1 shadow-inner"><button id="listBtn" class="rounded px-5 py-1.5 text-sm font-medium text-slate-600">列表</button><button id="calBtn" class="rounded border border-slate-200/70 bg-white px-5 py-1.5 text-sm font-medium text-slate-900 shadow-sm">日曆</button></div>
</div>
<div class="scrollbar flex items-center justify-between gap-6 overflow-x-auto pb-1"><div id="filters" class="flex gap-2.5"><button data-tag="all" class="filter rounded-full bg-[#1c2c44] px-5 py-1.5 text-sm font-medium text-white shadow-sm">全部</button></div><div id="resultCount" class="shrink-0 whitespace-nowrap text-sm font-medium text-slate-500">載入中...</div></div>
</div>
</section>
<main class="mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
<div id="loading" class="py-20 text-center font-medium text-slate-500">正在直接從 Google Sheet 載入即時活動數據...</div>
<div id="calendarView" class="hidden flex-col gap-8 lg:flex-row">
<aside class="w-full shrink-0 lg:w-[340px]"><div class="sticky top-48 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"><div id="calendar"></div><div class="mt-6 flex items-center justify-center gap-5 border-t border-slate-100 pt-5 text-xs text-slate-500"><span class="flex items-center gap-2"><i class="h-2.5 w-2.5 rounded-full bg-orange-400"></i>1-2 個活動</span><span class="flex items-center gap-2"><i class="h-2.5 w-2.5 rounded-full bg-red-500"></i>3+ 個活動</span></div><p class="mt-3 text-center text-xs text-slate-400">點擊已選日期可取消選擇</p></div></aside>
<section class="min-w-0 flex-1"><h2 class="mb-5 flex items-center gap-2 text-lg font-bold text-slate-800"><span id="listTitle">載入中...</span><span id="listCount" class="text-sm font-normal text-slate-500"></span></h2><div id="dateList" class="space-y-4"></div></section>
</div>
<div id="listView" class="hidden"><div id="allList" class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3"></div></div>
</main>
<div id="modal" class="modal fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/45 p-4 backdrop-blur-sm"><div class="flex max-h-[90vh] w-full max-w-3xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl"><div class="flex items-center justify-between border-b border-slate-100 p-5"><h3 class="text-lg font-bold text-slate-900">活動詳情</h3><button id="closeModal" class="rounded-full bg-slate-50 px-3 py-2 text-slate-500 hover:bg-slate-100">關閉</button></div><div id="modalContent" class="scrollbar overflow-y-auto p-6 md:p-8"></div></div></div>
<script>
const SHEET_ID='1cx1UgoMy8ynIVv9XeAvymrleVpX9VnnNX0IjjkUFfyc';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
const $=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let activities=[],currentTag='all',query='',view='calendar',calMonth=new Date(),selectedDate=null;
function parseCSV(text){const rows=[['']];let r=0,c=0,q=false;for(let i=0;i<text.length;i++){const ch=text[i],nx=text[i+1];if(ch==='"'&&q&&nx==='"'){rows[r][c]+=ch;i++;continue}if(ch==='"'){q=!q;continue}if(ch===','&&!q){rows[r][++c]='';continue}if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&nx==='\n')i++;rows[++r]=[''];c=0;continue}rows[r][c]+=ch}const headers=rows.shift().map(h=>h.trim());return rows.filter(row=>row.some(Boolean)).map(row=>Object.fromEntries(headers.map((h,i)=>[h,row[i]||''])))}
function normalizeDate(s){if(!s)return null;const m=String(s).match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);if(!m)return null;return `${m[1]}/${m[2].padStart(2,'0')}/${m[3].padStart(2,'0')}`}
function displayDeadline(s){if(!s||!String(s).trim())return '—';if(/^\d+$/.test(s)){const d=new Date(parseInt(s,10));return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`}const n=normalizeDate(s);if(n){const [y,m,d]=n.split('/');return `${y}年${parseInt(m)}月${parseInt(d)}日`}return s}
function expandDates(row){let dates=[];if(row.eventDates){const found=row.eventDates.match(/\d{4}[-/]\d{1,2}[-/]\d{1,2}/g);if(found)dates=found.map(normalizeDate).filter(Boolean)}if(!dates.length&&row.eventDateStart&&row.eventDateEnd){const s=normalizeDate(row.eventDateStart),e=normalizeDate(row.eventDateEnd);if(s&&e){let cur=new Date(s.replace(/-/g,'/')),end=new Date(e.replace(/-/g,'/'));const diff=Math.round((end-cur)/(86400000));if(diff>=0&&diff<=14){while(cur<=end){dates.push(`${cur.getFullYear()}/${String(cur.getMonth()+1).padStart(2,'0')}/${String(cur.getDate()).padStart(2,'0')}`);cur.setDate(cur.getDate()+1)}}}}
if(!dates.length&&row.eventDateDisplay){const d=normalizeDate(row.eventDateDisplay);if(d)dates=[d]}return [...new Set(dates)]}
function transform(rows){const tags=new Set();activities=rows.map(row=>{const tagList=(row.categoryTags||'').split(',').map(t=>t.trim()).filter(Boolean);tagList.forEach(t=>tags.add(t));return{courseId:row.courseId||'',title:row.title||'未命名活動',eventDateStart:row.eventDateStart||'',eventDateDisplay:row.eventDateDisplay||'—',eventTime:row.eventTime||'—',deadlineDisplay:displayDeadline(row.deadline),publishDateDisplay:row.publishDate||'—',eventDates:expandDates(row),cpdCategory:row.cpdCategory||'一般',subject:row.subject||'',summary:row.summary||'無簡介',isNew:String(row.isNew||'').toUpperCase()==='TRUE',categoryTags:tagList,detailUrl:row.detailUrl||'#'}}).sort((a,b)=>{const ta=Date.parse((a.eventDateStart||'2999/12/31').replace(/-/g,'/'))||0;const tb=Date.parse((b.eventDateStart||'2999/12/31').replace(/-/g,'/'))||0;return ta-tb});renderFilters([...tags].sort())}
function filtered(){const q=query.trim().toLowerCase();return activities.filter(a=>(currentTag==='all'||a.categoryTags.includes(currentTag))&&(!q||[a.title,a.courseId,a.subject,a.summary].some(v=>String(v).toLowerCase().includes(q))))}
function byDate(date){return filtered().filter(a=>a.eventDates.includes(date))}
function renderFilters(tags){$('filters').innerHTML='<button data-tag="all" class="filter rounded-full bg-[#1c2c44] px-5 py-1.5 text-sm font-medium text-white shadow-sm">全部</button>'+tags.map(t=>`<button data-tag="${esc(t)}" class="filter rounded-full bg-slate-100 px-5 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-200">${esc(t)}</button>`).join('')}
function eventCounts(){const counts={};filtered().forEach(a=>a.eventDates.forEach(d=>counts[d]=(counts[d]||0)+1));return counts}
function renderCalendar(){const y=calMonth.getFullYear(),m=calMonth.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),counts=eventCounts();let html=`<div class="mb-6 flex items-center justify-between"><button class="month rounded-lg p-1.5 text-slate-500 hover:bg-slate-100" data-step="-1">‹</button><h2 class="text-[17px] font-bold tracking-wide text-slate-900">${y} 年 ${m+1} 月</h2><button class="month rounded-lg p-1.5 text-slate-500 hover:bg-slate-100" data-step="1">›</button></div><div class="mb-3 grid grid-cols-7 text-center text-[13px] font-medium text-slate-500"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div><div class="grid grid-cols-7 gap-y-2 text-center">`;for(let i=0;i<first;i++)html+='<div></div>';for(let d=1;d<=days;d++){const ds=`${y}/${String(m+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`,cnt=counts[ds]||0,sel=selectedDate===ds;const dots=cnt?`<div class="mt-1 flex h-1.5 justify-center gap-0.5">${Array.from({length:Math.min(cnt,2)},()=>`<i class="h-1.5 w-1.5 rounded-full ${cnt>=3?'bg-red-500':'bg-orange-400'}"></i>`).join('')}</div>`:'<div class="mt-1 h-1.5"></div>';html+=`<div class="flex flex-col items-center"><button data-date="${ds}" class="day mx-auto flex h-8 w-8 items-center justify-center rounded-full text-sm transition ${sel?'bg-[#1c2c44] text-white shadow-md':'text-slate-700 hover:bg-slate-100'}">${d}</button>${dots}</div>`}html+='</div>';$('calendar').innerHTML=html}
function card(a){const tags=`<span class="rounded bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">${esc(a.cpdCategory)}</span>${a.isNew?'<span class="ml-2 rounded border border-red-200 bg-red-50 px-2.5 py-1 text-xs font-medium text-red-500">新增</span>':''}`;return `<article class="group relative flex h-full flex-col rounded-xl border border-slate-200 bg-white p-6 shadow-sm transition hover:shadow-md"><div class="mb-3">${tags}</div><h3 class="pr-8 text-[17px] font-bold leading-snug text-slate-950 group-hover:text-blue-700">${esc(a.title)}</h3><p class="mt-1.5 font-mono text-xs tracking-wider text-slate-400">${esc(a.courseId)}</p><div class="mt-4 space-y-1.5 text-sm text-slate-600"><p>活動日期：<b class="ml-1 font-medium text-slate-900">${esc(a.eventDateDisplay||'—')}</b></p><p>活動時間：<span class="ml-1 text-slate-900">${esc(a.eventTime||'—')}</span></p><p><span class="text-orange-500">報名截止：</span><span class="ml-1 text-slate-900">${esc(a.deadlineDisplay||'—')}</span></p></div><p class="mt-5 line-clamp-3 rounded-r-lg border-l-4 border-blue-400 bg-slate-50 p-4 text-[13px] leading-relaxed text-slate-700">${esc(a.summary)}</p><div class="mt-auto flex justify-end pt-5"><button class="detail rounded-lg bg-[#1c2c44] px-5 py-2 text-sm font-medium text-white shadow-sm hover:bg-slate-800" data-id="${esc(a.courseId)}">活動詳情</button></div></article>`}
function empty(text){return `<div class="rounded-xl border border-dashed border-slate-200 bg-slate-50 p-10 text-center text-slate-500">${text}</div>`}
function renderDateList(){const data=selectedDate?byDate(selectedDate):filtered();if(selectedDate){const [y,m,d]=selectedDate.split('/');$('listTitle').textContent=`${y}年${parseInt(m)}月${parseInt(d)}日 的活動`}else $('listTitle').textContent='所有篩選活動';$('listCount').textContent=`(${data.length} 個)`;$('dateList').innerHTML=data.length?data.map(card).join(''):empty('該日期或條件下暫無活動')}
function renderAllList(){const data=filtered();$('allList').innerHTML=data.length?data.map(card).join(''):`<div class="col-span-full">${empty('找不到符合條件的活動')}</div>`}
function refresh(){const data=filtered();$('resultCount').textContent=`${data.length} 個結果`;renderCalendar();if(view==='calendar')renderDateList();else renderAllList()}
function setView(v){view=v;const active='rounded border border-slate-200/70 bg-white px-5 py-1.5 text-sm font-medium text-slate-900 shadow-sm',inactive='rounded px-5 py-1.5 text-sm font-medium text-slate-600';$('calBtn').className=v==='calendar'?active:inactive;$('listBtn').className=v==='list'?active:inactive;$('calendarView').className=v==='calendar'?'flex flex-col gap-8 lg:flex-row':'hidden';$('listView').className=v==='list'?'block':'hidden';refresh()}
function showDetail(id){const a=activities.find(x=>x.courseId===id);if(!a)return;const url=a.detailUrl&&a.detailUrl.startsWith('http')?a.detailUrl:'#';$('modalContent').innerHTML=`<div class="mb-5 border-b border-slate-100 pb-5"><span class="mb-3 inline-block rounded-md bg-blue-50 px-3 py-1 text-sm font-medium text-blue-700">${esc(a.cpdCategory)}</span><h2 class="text-2xl font-bold leading-snug text-slate-950">${esc(a.title)}</h2><p class="mt-2 font-mono text-sm text-slate-500">編號: ${esc(a.courseId)}</p></div><div class="mb-6 grid grid-cols-1 gap-4 md:grid-cols-2"><div class="rounded-xl border border-slate-100 bg-slate-50 p-4"><p class="mb-1 text-xs text-slate-500">活動日期</p><p class="font-medium text-slate-900">${esc(a.eventDateDisplay)}</p><p class="mt-1 text-sm text-slate-600">${esc(a.eventTime)}</p></div><div class="rounded-xl border border-orange-100 bg-orange-50 p-4"><p class="mb-1 text-xs text-orange-500">報名截止日期</p><p class="font-bold text-orange-600">${esc(a.deadlineDisplay)}</p></div></div><h3 class="mb-3 text-lg font-bold text-slate-950">活動簡介</h3><p class="whitespace-pre-wrap rounded-xl bg-slate-50 p-5 leading-relaxed text-slate-700">${esc(a.summary)}</p><div class="mt-8 flex justify-end"><a class="rounded-xl bg-blue-600 px-8 py-3 text-sm font-bold text-white shadow-md shadow-blue-500/20 hover:bg-blue-700" target="_blank" href="${esc(url)}">前往 EDB 報名</a></div>`;$('modal').classList.remove('hidden');$('modal').classList.add('flex');document.body.style.overflow='hidden'}
$('filters').addEventListener('click',e=>{const b=e.target.closest('.filter');if(!b)return;currentTag=b.dataset.tag;document.querySelectorAll('.filter').forEach(x=>x.className='filter rounded-full bg-slate-100 px-5 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-200');b.className='filter rounded-full bg-[#1c2c44] px-5 py-1.5 text-sm font-medium text-white shadow-sm';refresh()});
$('searchInput').addEventListener('input',e=>{query=e.target.value;refresh()});$('calBtn').onclick=()=>setView('calendar');$('listBtn').onclick=()=>setView('list');$('calendar').addEventListener('click',e=>{const m=e.target.closest('.month'),d=e.target.closest('.day');if(m){calMonth.setMonth(calMonth.getMonth()+parseInt(m.dataset.step));renderCalendar()}if(d){selectedDate=selectedDate===d.dataset.date?null:d.dataset.date;refresh()}});document.body.addEventListener('click',e=>{const b=e.target.closest('.detail');if(b)showDetail(b.dataset.id)});$('closeModal').onclick=()=>{$('modal').classList.add('hidden');$('modal').classList.remove('flex');document.body.style.overflow=''};$('modal').addEventListener('click',e=>{if(e.target.id==='modal')$('closeModal').click()});
fetch(CSV_URL).then(r=>{if(!r.ok)throw Error('load failed');return r.text()}).then(t=>{transform(parseCSV(t));const now=new Date();const today=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;selectedDate=today;calMonth=new Date(now.getFullYear(),now.getMonth(),1);$('statTotal').textContent=`${activities.length} 個活動`;$('statUpdated').textContent=`最新同步於 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;$('loading').classList.add('hidden');setView('calendar')}).catch(err=>{$('loading').innerHTML='<span class="inline-block rounded-lg border border-red-200 bg-red-50 p-4 font-bold text-red-600">載入 Google Sheet 失敗。請確認試算表已設為「知道連結的使用者均可查看」。</span>';console.error(err)});
</script>
</body>
</html>
